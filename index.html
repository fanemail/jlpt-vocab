<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 詞彙學習工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #e8f4fd;
    color: #1a2a3a;
    min-height: 100vh;
    padding-top: 48px;
    padding-bottom: 20px;
  }

  /* ── 頂部固定區 ── */
  .app-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: #1a6fa8;
  }
  .tab-bar {
    display: flex; height: 48px;
    background: #1a6fa8;
  }
  .tab-item {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500; cursor: pointer; color: #b8d8f0;
    border: none; background: none; transition: all 0.15s;
  }
  .tab-item.active { color: #fff; background: #0d5a8a; border-bottom: 3px solid #fff; }
  .tab-item:hover { color: #fff; background: rgba(255,255,255,0.1); }

  /* ── 頁面容器 ── */
  .page { display: none; padding: 16px 20px; }
  .page.active { display: block; }

  /* ── 通用組件 ── */
  .section-label { font-size: 14px; color: #2a6a9a; font-weight: 600; margin-bottom: 8px; }
  .level-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .level-btn {
    padding: 7px 16px; border-radius: 20px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .level-btn.active { background: #1a6fa8; border-color: #1a6fa8; color: #fff; }
  .level-btn:hover { background: #d0eaf8; }
  .group-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    max-height: 120px; overflow-y: auto; margin-bottom: 16px;
  }
  .group-btn {
    padding: 5px 11px; border-radius: 6px; border: 1px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 13px; cursor: pointer;
  }
  .group-btn.active { background: #1a6fa8; border-color: #1a6fa8; color: #fff; }
  .group-btn:hover { background: #d0eaf8; }
  .primary-btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: #1a6fa8; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-bottom: 16px;
  }
  .primary-btn:disabled { opacity: 0.3; cursor: default; }
  .primary-btn:not(:disabled):hover { background: #0d5a8a; }
  .card {
    background: #fff; border: 1px solid #b8d8f0; border-radius: 14px;
    padding: 18px; margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(26,111,168,0.08);
  }
  .card-title { font-size: 14px; color: #2a6a9a; font-weight: 600; margin-bottom: 12px; }
  .status-msg { text-align: center; font-size: 14px; color: #6a9ab8; padding: 14px; }
  .sound-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sound-btn:hover { background: #d0eaf8; }
  .sound-btn.playing { background: #1a6fa8; color: #fff; }
  .judge-row {
    display: flex; gap: 12px; margin-bottom: 14px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .judge-row.visible { opacity: 1; pointer-events: auto; }
  .judge-btn { flex: 1; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; }
  .judge-btn.unknown { background: #fde8e8; color: #c0392b; border: 2px solid #e74c3c; }
  .judge-btn.known { background: #e8f8e8; color: #1a7a1a; border: 2px solid #2ecc71; }
  .nav-row { display: flex; gap: 10px; justify-content: center; }
  .nav-btn {
    padding: 9px 20px; border-radius: 8px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:not(:disabled):hover { background: #d0eaf8; }

  /* ══ 純聽 ══ */
  .player-info { font-size: 13px; color: #2a6a9a; margin-bottom: 6px; }
  .player-time { font-size: 14px; color: #1a2a3a; font-weight: 500; margin-bottom: 10px; }
  .progress-bar-bg {
    height: 8px; background: #b8d8f0; border-radius: 4px;
    margin-bottom: 10px; cursor: pointer; position: relative;
  }
  .progress-bar-fill { height: 8px; background: #1a6fa8; border-radius: 4px; width: 0%; pointer-events: none; }
  .player-ctrl { display: flex; gap: 8px; justify-content: center; align-items: center; }
  .ctrl-btn {
    padding: 8px 16px; border-radius: 8px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .ctrl-btn.play { background: #1a6fa8; border-color: #1a6fa8; color: #fff; padding: 8px 22px; font-size: 15px; font-weight: 600; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .ctrl-btn:not(:disabled):hover { background: #d0eaf8; color: #1a6fa8; }
  .ctrl-btn.play:not(:disabled):hover { background: #0d5a8a; color: #fff; }

  .listen-word-list { display: flex; flex-direction: column; gap: 4px; }
  .listen-word-item {
    display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap;
    padding: 10px 14px; border-radius: 10px;
    border: 1px solid #d0e8f8; background: #fff;
    transition: all 0.2s; cursor: pointer;
  }
  .listen-word-item.current {
    background: #fff8e1; border-color: #f0a500; border-width: 2px;
  }
  .listen-word-item.played { opacity: 0.5; }
  .lw-num { font-size: 13px; color: #6a9ab8; min-width: 28px; padding-top: 2px; }
  .lw-kanji { font-size: 20px; color: #1a2a3a; font-weight: 700; min-width: 70px; }
  .lw-reading { font-size: 16px; color: #1a6fa8; font-weight: 500; min-width: 80px; padding-top: 3px; }
  .lw-meaning-display {
    font-size: 15px; color: #c0392b; font-weight: 500;
    display: none; width: 100%; margin-top: 4px; line-height: 1.6;
    word-break: break-all; padding-left: 38px;
  }

  /* ══ 練習 ══ */
  .mode-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .mode-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
  }
  .mode-btn.active { background: #1a6fa8; border-color: #1a6fa8; color: #fff; }
  .unknown-badge {
    display: inline-block; background: #e74c3c; color: #fff;
    font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 5px;
  }
  .fc-stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .fc-stat { flex: 1; background: #fff; border: 1px solid #b8d8f0; border-radius: 10px; padding: 10px; text-align: center; }
  .fc-stat-num { font-size: 24px; font-weight: 700; }
  .fc-stat-num.known { color: #1a7a1a; }
  .fc-stat-num.unknown { color: #c0392b; }
  .fc-stat-label { font-size: 12px; color: #6a9ab8; margin-top: 2px; }
  .fc-progress { display: flex; justify-content: space-between; font-size: 14px; color: #2a6a9a; margin-bottom: 10px; font-weight: 500; }
  .fc-card {
    background: #fff; border: 2px solid #b8d8f0; border-radius: 16px;
    padding: 32px 20px; margin-bottom: 14px; text-align: center;
    min-height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(26,111,168,0.1);
  }
  .fc-kanji { font-size: 52px; color: #1a2a3a; font-weight: 700; }
  .fc-reading { font-size: 24px; color: #1a6fa8; font-weight: 600; min-height: 30px; transition: opacity 0.2s; }
  .fc-reading.hidden { opacity: 0; }
  .fc-meaning { font-size: 16px; color: #c0392b; font-weight: 500; min-height: 22px; transition: opacity 0.2s; line-height: 1.5; }
  .fc-meaning.hidden { opacity: 0; }
  .fc-actions { display: flex; gap: 12px; align-items: center; justify-content: center; margin-bottom: 12px; }
  .reveal-btn {
    padding: 10px 28px; border-radius: 8px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .reveal-btn:hover { background: #d0eaf8; }

  /* ══ 複習 ══ */
  .task-count { font-size: 52px; font-weight: 700; color: #1a6fa8; text-align: center; margin-bottom: 4px; }
  .task-unit { font-size: 15px; color: #2a6a9a; text-align: center; margin-bottom: 16px; }
  .prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .prog-box { background: #f0f8ff; border: 1px solid #b8d8f0; border-radius: 10px; padding: 14px; text-align: center; }
  .prog-num { font-size: 28px; font-weight: 700; }
  .prog-num.mastered { color: #1a7a1a; }
  .prog-num.rknown { color: #1a6fa8; }
  .prog-num.runknown { color: #c0392b; }
  .prog-num.unseen { color: #8aabbf; }
  .prog-label { font-size: 13px; color: #2a6a9a; margin-top: 4px; font-weight: 500; }
  .bar-row { margin-bottom: 4px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; color: #2a6a9a; margin-bottom: 5px; font-weight: 500; }
  .bar-bg { height: 10px; background: #d0e8f8; border-radius: 5px; overflow: hidden; display: flex; }
  .bar-seg { height: 100%; }
  .bar-seg.mastered { background: #2ecc71; }
  .bar-seg.rknown { background: #1a6fa8; }
  .bar-seg.runknown { background: #e74c3c; }
  .schedule-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #d0e8f8; font-size: 15px;
  }
  .schedule-row:last-child { border-bottom: none; }
  .rv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .rv-title { font-size: 17px; color: #1a2a3a; font-weight: 600; }
  .back-btn {
    padding: 7px 16px; border-radius: 6px; border: 2px solid #4a9fd4;
    background: #fff; color: #1a6fa8; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .rv-card {
    background: #fff; border: 2px solid #b8d8f0; border-radius: 16px;
    padding: 32px 20px; margin-bottom: 14px; text-align: center;
    min-height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(26,111,168,0.1);
  }
  .rv-kanji { font-size: 52px; color: #1a2a3a; font-weight: 700; }
  .rv-reading { font-size: 24px; color: #1a6fa8; font-weight: 600; transition: opacity 0.2s; }
  .rv-reading.hidden { opacity: 0; }
  .rv-meaning { font-size: 16px; color: #c0392b; font-weight: 500; transition: opacity 0.2s; line-height: 1.5; }
  .rv-meaning.hidden { opacity: 0; }
  .rv-info { font-size: 13px; color: #6a9ab8; }
  .done-card { background: #fff; border: 2px solid #b8d8f0; border-radius: 16px; padding: 40px 20px; text-align: center; box-shadow: 0 2px 12px rgba(26,111,168,0.1); }
  .done-emoji { font-size: 48px; margin-bottom: 14px; }
  .done-title { font-size: 22px; color: #1a2a3a; font-weight: 700; margin-bottom: 8px; }
  .done-sub { font-size: 16px; color: #2a6a9a; margin-bottom: 22px; }

  /* ══ 單詞列表 ══ */
  .wl-word-list { display: flex; flex-direction: column; gap: 4px; }
  .wl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-radius: 10px;
    border: 1px solid #d0e8f8; background: #fff;
    transition: all 0.15s;
  }
  .wl-item.current { background: #fff8e1; border-color: #f0a500; border-width: 2px; }
  .wl-kanji { font-size: 20px; color: #1a2a3a; font-weight: 700; min-width: 70px; }
  .wl-reading { font-size: 16px; color: #1a6fa8; font-weight: 500; min-width: 80px; }
  .wl-meaning { font-size: 15px; color: #c0392b; font-weight: 500; flex: 1; line-height: 1.5; }
  .wl-badge {
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    background: #d0eaf8; color: #1a6fa8; font-weight: 500;
  }
  .wl-item.current .wl-kanji { color: #8a5200; }
  .wl-item.current .wl-reading { color: #b06000; }

  /* ══ 進度 ══ */
  .level-stat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #d0e8f8; font-size: 15px;
  }
  .level-stat-row:last-child { border-bottom: none; }
  .level-tag { min-width: 36px; text-align: center; padding: 3px 8px; border-radius: 6px; font-size: 13px; font-weight: 700; background: #d0eaf8; color: #1a6fa8; }
  .level-bar-bg { flex: 1; height: 8px; background: #d0e8f8; border-radius: 4px; overflow: hidden; }
  .level-bar-fill { height: 100%; background: #1a6fa8; }

  #audio { display: none; }
</style>
</head>
<body>

<div class="app-top">
  <div class="tab-bar">
    <div style="display:flex;align-items:center;padding:0 10px;color:#fff;font-size:13px;font-weight:600;white-space:nowrap;border-right:1px solid #1a5a8a;">JLPT<br><span style="font-size:10px;color:#7ab;font-weight:400" id="headerSub">載入中</span></div>
    <button class="tab-item active" onclick="switchTab('listen',this)">🎧 純聽</button>
    <button class="tab-item" onclick="switchTab('practice',this)">📚 練習</button>
    <button class="tab-item" onclick="switchTab('review',this)">📅 複習</button>
    <button class="tab-item" onclick="switchTab('wordlist',this)">📖 單詞</button>
    <button class="tab-item" onclick="switchTab('stats',this)">📊 進度</button>
  </div>
</div>

<!-- ══ 純聽 ══ -->
<div class="page active" id="page-listen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <div class="section-label" style="margin:0">選擇等級</div>
    <div id="l-time" style="font-size:13px;color:#2a6a9a;font-weight:500;">—</div>
  </div>
  <div class="level-row" id="l-levelRow"></div>
  <div class="section-label">選擇分組</div>
  <div class="group-row" id="l-groupRow"><div class="status-msg">請先選擇等級</div></div>
  <div style="position:sticky;top:48px;z-index:150;background:#e8f4fd;padding:8px 0 8px;border-bottom:2px solid #b8d8f0;margin-bottom:10px;">
    <div class="progress-bar-bg" id="l-barBg" style="margin-bottom:8px;">
      <div class="progress-bar-fill" id="l-barFill"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;align-items:center;">
      <button class="ctrl-btn" id="l-prevBtn" onclick="lPrevGroup()" disabled>上一組</button>
      <button class="ctrl-btn play" id="l-playBtn" onclick="lTogglePlay()" disabled>播放</button>
      <button class="ctrl-btn" id="l-nextBtn" onclick="lNextGroup()" disabled>下一組</button>
      <label style="font-size:13px;color:#2a6a9a;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;margin-left:4px;">
        <input type="checkbox" id="l-ttsToggle" checked style="width:15px;height:15px;cursor:pointer">
        讀釋義
      </label>
    </div>
    <div id="l-nowPlaying" style="font-size:12px;color:#2a6a9a;text-align:center;margin-top:5px;display:none"></div>
  </div>
  <div id="l-wordList"><div class="status-msg">選擇分組後顯示詞彙列表</div></div>
</div>

<!-- ══ 練習 ══ -->
<div class="page" id="page-practice">
  <div id="practiceSelector">
    <div class="mode-row">
      <div class="mode-btn active" id="p-modeGroup" onclick="pSetMode('group')">📚 按分組練習</div>
      <div class="mode-btn" id="p-modeUnknown" onclick="pSetMode('unknown')">❓ 只練不認識<span class="unknown-badge" id="p-unknownBadge">0</span></div>
    </div>
    <div id="p-groupSelector">
      <div class="section-label">選擇等級</div>
      <div class="level-row" id="p-levelRow"></div>
      <div class="section-label">選擇分組</div>
      <div class="group-row" id="p-groupRow"><div class="status-msg">請先選擇等級</div></div>
    </div>
    <button class="primary-btn" id="p-startBtn" onclick="pStartPractice()" disabled>開始練習</button>
  </div>
  <div id="flashcardArea" style="display:none">
    <div class="fc-stats">
      <div class="fc-stat"><div class="fc-stat-num known" id="p-known">0</div><div class="fc-stat-label">認識</div></div>
      <div class="fc-stat"><div class="fc-stat-num unknown" id="p-unknown">0</div><div class="fc-stat-label">不認識</div></div>
    </div>
    <div class="fc-progress"><span id="p-progress">1/50</span><span id="p-groupLabel"></span></div>
    <div class="fc-card">
      <div class="fc-kanji" id="p-kanji">—</div>
      <div class="fc-reading hidden" id="p-reading">—</div>
      <div class="fc-meaning hidden" id="p-meaning"></div>
    </div>
    <div class="fc-actions">
      <button class="sound-btn" id="p-soundBtn" onclick="pPlayWord()">🔊</button>
      <button class="reveal-btn" onclick="pReveal()">翻開答案</button>
    </div>
    <div class="judge-row" id="p-judgeRow">
      <button class="judge-btn unknown" onclick="pJudge('unknown')">✗ 不認識</button>
      <button class="judge-btn known" onclick="pJudge('known')">✓ 認識</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="p-prevBtn" onclick="pPrev()" disabled>上一張</button>
      <button class="nav-btn" id="p-nextBtn" onclick="pNext()">下一張</button>
      <button class="nav-btn" onclick="pEnd()">結束</button>
    </div>
  </div>
</div>

<!-- ══ 複習 ══ -->
<div class="page" id="page-review">
  <div id="reviewHome">
    <div class="card">
      <div class="card-title">📅 今日複習任務</div>
      <div class="task-count" id="r-todayCount">0</div>
      <div class="task-unit">個詞到期複習</div>
      <button class="primary-btn" id="r-startBtn" onclick="rStartReview()" disabled style="margin-bottom:0">開始複習</button>
    </div>
    <div class="card">
      <div class="card-title">📊 整體學習進度</div>
      <div class="prog-grid">
        <div class="prog-box"><div class="prog-num mastered" id="r-mastered">0</div><div class="prog-label">已掌握</div></div>
        <div class="prog-box"><div class="prog-num rknown" id="r-known">0</div><div class="prog-label">複習中</div></div>
        <div class="prog-box"><div class="prog-num runknown" id="r-unknown">0</div><div class="prog-label">不認識</div></div>
        <div class="prog-box"><div class="prog-num unseen" id="r-unseen">0</div><div class="prog-label">未學習</div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>學習進度</span><span id="r-barPct">0%</span></div>
        <div class="bar-bg">
          <div class="bar-seg mastered" id="r-barMastered" style="width:0%"></div>
          <div class="bar-seg rknown" id="r-barKnown" style="width:0%"></div>
          <div class="bar-seg runknown" id="r-barUnknown" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📆 未來複習計劃</div>
      <div id="r-schedule"><div class="status-msg">暫無複習計劃</div></div>
    </div>
  </div>
  <div id="reviewPracticeArea" style="display:none">
    <div class="rv-header">
      <div class="rv-title">今日複習</div>
      <button class="back-btn" onclick="rBackHome()">← 返回</button>
    </div>
    <div class="fc-stats">
      <div class="fc-stat"><div class="fc-stat-num known" id="rv-known">0</div><div class="fc-stat-label">認識</div></div>
      <div class="fc-stat"><div class="fc-stat-num unknown" id="rv-unknown">0</div><div class="fc-stat-label">不認識</div></div>
    </div>
    <div class="fc-progress"><span id="rv-progress">1/0</span><span id="rv-label"></span></div>
    <div class="rv-card" id="rv-card">
      <div class="rv-kanji" id="rv-kanji">—</div>
      <div class="rv-reading hidden" id="rv-reading">—</div>
      <div class="rv-meaning hidden" id="rv-meaning"></div>
      <div class="rv-info" id="rv-info"></div>
    </div>
    <div id="rv-done" class="done-card" style="display:none">
      <div class="done-emoji">🎉</div>
      <div class="done-title">複習完成！</div>
      <div class="done-sub" id="rv-doneSub"></div>
      <button class="primary-btn" onclick="rBackHome()" style="margin-bottom:0">返回首頁</button>
    </div>
    <div id="rv-actions">
      <div class="fc-actions">
        <button class="sound-btn" id="rv-soundBtn" onclick="rvPlayWord()">🔊</button>
        <button class="reveal-btn" onclick="rvReveal()">翻開答案</button>
      </div>
      <div class="judge-row" id="rv-judgeRow">
        <button class="judge-btn unknown" onclick="rvJudge('unknown')">✗ 不認識</button>
        <button class="judge-btn known" onclick="rvJudge('known')">✓ 認識</button>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="rv-prevBtn" onclick="rvPrev()" disabled>上一張</button>
        <button class="nav-btn" id="rv-nextBtn" onclick="rvNext()">下一張</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ 單詞列表 ══ -->
<div class="page" id="page-wordlist">
  <div class="section-label">選擇等級</div>
  <div class="level-row" id="wl-levelRow"></div>
  <div class="section-label">選擇分組</div>
  <div class="group-row" id="wl-groupRow"><div class="status-msg">請先選擇等級</div></div>
  <div id="wl-list"><div class="status-msg">選擇分組後顯示單詞列表</div></div>
</div>

<!-- ══ 進度 ══ -->
<div class="page" id="page-stats">
  <div class="card">
    <div class="card-title">📊 各等級學習進度</div>
    <div id="s-levelStats"><div class="status-msg">載入中...</div></div>
  </div>
  <div class="card">
    <div class="card-title">🗓️ 學習統計</div>
    <div id="s-summary"><div class="status-msg">載入中...</div></div>
  </div>
</div>

<audio id="audio"></audio>

<script>
// ════════════════════════════════════════
// 共用
// ════════════════════════════════════════
let vocab = null;
const STORAGE_KEY = 'jlpt_records';
const audio = document.getElementById('audio');

function loadRecords() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch { return {}; } }
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function addDays(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function getNextReview(n) { return addDays([1,2,4,7,14][Math.min(n,4)]); }
function fmt(s) { const m=Math.floor(s/60); return `${m}:${Math.floor(s%60).toString().padStart(2,'0')}`; }

async function init() {
  try {
    const res = await fetch('vocabulary.json');
    vocab = await res.json();
    document.getElementById('headerSub').textContent = `共 ${vocab.words.length} 個詞`;
    buildLevelButtons('l-levelRow', lSelectLevel);
    buildLevelButtons('p-levelRow', pSelectLevel);
    buildLevelButtons('wl-levelRow', wlSelectLevel);
    updateUnknownBadge();
    rUpdateHome();
    sUpdateStats();
  } catch(e) {
    document.getElementById('headerSub').textContent = '載入失敗，請確認伺服器已啟動';
  }
}

function buildLevelButtons(id, fn) {
  const row = document.getElementById(id);
  row.innerHTML = '';
  ['N5','N4','N3','N2','N1'].forEach(lv => {
    const b = document.createElement('button');
    b.className = 'level-btn'; b.textContent = lv;
    b.onclick = () => { row.querySelectorAll('.level-btn').forEach(x=>x.classList.toggle('active',x===b)); fn(lv); };
    row.appendChild(b);
  });
}

function buildGroupButtons(rowId, level, fn) {
  const groups = [...new Set(vocab.words.filter(w=>w.level===level).map(w=>w.group_id))].sort();
  const row = document.getElementById(rowId);
  row.innerHTML = '';
  groups.forEach(gid => {
    const b = document.createElement('button');
    b.className = 'group-btn'; b.textContent = gid.replace(level+'-G','G'); b.dataset.gid = gid;
    b.onclick = () => { row.querySelectorAll('.group-btn').forEach(x=>x.classList.toggle('active',x===b)); fn(gid); };
    row.appendChild(b);
  });
}

function switchTab(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if (name==='review') rUpdateHome();
  if (name==='stats') sUpdateStats();
}

// ════════════════════════════════════════
// 純聽（逐詞串接播放）
// ════════════════════════════════════════
let lGroup=null, lLevel=null;
let lWords=[], lWordIdx=0, lRepeat=0;
let lIsPlaying=false, lIsPaused=false, lIsSpeaking=false;
let lAllGroups=[];
let lMeaningTimers={}; // 各詞條釋義消失計時器

const SERIAL_PREFIX = 'temp_audio/serials/';
const AUDIO_PREFIX  = 'audio/';
const SILENCE_AFTER_SERIAL = 500;
const SILENCE_BETWEEN_REPEAT = 1500;
const SILENCE_BETWEEN_WORD = 1000;
const MEANING_DISPLAY_MS = 60000; // 60秒

function lSelectLevel(lv) {
  lLevel=lv; lGroup=null; lStopAll();
  buildGroupButtons('l-groupRow', lv, lSelectGroup);
  lAllGroups = [...new Set(vocab.words.filter(w=>w.level===lv).map(w=>w.group_id))].sort();
  document.getElementById('l-nowPlaying').textContent=`已選擇 ${lv}，請選擇分組`;
  document.getElementById('l-playBtn').disabled=true;
  document.getElementById('l-prevBtn').disabled=true;
  document.getElementById('l-nextBtn').disabled=true;
  document.getElementById('l-wordList').innerHTML='<div class="status-msg">選擇分組後顯示詞彙列表</div>';
}

function lSelectGroup(gid) {
  lGroup=gid; lStopAll();
  lWords=vocab.words.filter(w=>w.group_id===gid);
  const num=parseInt(gid.split('-G')[1]);
  document.getElementById('l-nowPlaying').textContent=`${lLevel} 第 ${num} 組`;
  document.getElementById('l-time').textContent=`共 ${lWords.length} 個詞`;
  document.getElementById('l-barFill').style.width='0%';
  document.getElementById('l-playBtn').disabled=false;
  document.getElementById('l-playBtn').textContent='播放';
  lUpdateNavBtns();
  // 清空列表，強制重新渲染
  document.getElementById('l-wordList').innerHTML='';
  lRenderWordList(-1);
}

function lRenderWordList(currentIdx) {
  // 只在第一次（currentIdx===-1）渲染整個列表，之後只更新class
  const container = document.getElementById('l-wordList');
  if(!container.querySelector('.listen-word-list')) {
    // 初次渲染
    const html = lWords.map((w,i) =>
      `<div class="listen-word-item" id="lwi-${i}" onclick="lClickWord(${i})">
        <span class="lw-num">${i+1}</span>
        <span class="lw-kanji">${w.kanji||w.reading}</span>
        <span class="lw-reading">${w.reading}</span>
        <span class="lw-meaning-display" id="lwm-${i}"></span>
      </div>`
    ).join('');
    container.innerHTML=`<div class="listen-word-list">${html}</div>`;
  } else {
    // 只更新class，不重新渲染
    lWords.forEach((_,i) => {
      const el=document.getElementById(`lwi-${i}`);
      if(!el) return;
      el.classList.remove('current','played');
      if(i===currentIdx) el.classList.add('current');
      else if(i<currentIdx) el.classList.add('played');
    });
  }
  // 高亮詞條滾動：考慮頂部固定欄高度，精確定位到可視區域中間
  if(currentIdx>=0) {
    const el=document.getElementById(`lwi-${currentIdx}`);
    if(el) {
      const rect=el.getBoundingClientRect();
      const viewH=window.innerHeight;
      const fixedH=document.querySelector('#page-listen [style*="sticky"]')?.offsetHeight||80;
      const topBar=48; // Tab欄高度
      const totalFixed=topBar+fixedH;
      const availH=viewH-totalFixed;
      const elCenter=rect.top+rect.height/2;
      const targetCenter=totalFixed+availH/2;
      // 詞條偏離可視區中間超過1/4時才滾動
      if(Math.abs(elCenter-targetCenter)>availH/4) {
        const scrollY=window.scrollY+rect.top-totalFixed-availH/2+rect.height/2;
        window.scrollTo({top:scrollY, behavior:'smooth'});
      }
    }
  }
}

function lUpdateNavBtns() {
  const i=lAllGroups.indexOf(lGroup);
  document.getElementById('l-prevBtn').disabled=i<=0;
  document.getElementById('l-nextBtn').disabled=i>=lAllGroups.length-1;
}
function lPrevGroup() { const i=lAllGroups.indexOf(lGroup); if(i>0) { const btns=[...document.querySelectorAll('#l-groupRow .group-btn')]; btns.find(b=>b.dataset.gid===lAllGroups[i-1])?.click(); } }
function lNextGroup() { const i=lAllGroups.indexOf(lGroup); if(i<lAllGroups.length-1) { const btns=[...document.querySelectorAll('#l-groupRow .group-btn')]; btns.find(b=>b.dataset.gid===lAllGroups[i+1])?.click(); } }

function lTogglePlay() {
  const btn=document.getElementById('l-playBtn');
  if(!lIsPlaying) {
    // 全新開始
    lWordIdx=0; lRepeat=0; lIsPlaying=true; lIsPaused=false; lIsSpeaking=false;
    btn.textContent='暫停';
    lPlayCurrentStep();
  } else {
    lDoPause();
  }
}

function lDoPause() {
  const btn=document.getElementById('l-playBtn');
  if(!lIsPaused) {
    lIsPaused=true;
    audio.pause();
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    lIsSpeaking=false;
    btn.textContent='繼續';
  } else {
    lIsPaused=false;
    lRepeat=0;
    btn.textContent='暫停';
    lPlayCurrentStep();
  }
}

function lClickWord(idx) {
  // 點擊詞條暫停/繼續
  if(lIsPlaying) lDoPause();
}

function lStopAll() {
  lIsPlaying=false; lIsPaused=false; lWordIdx=0; lRepeat=0; lIsSpeaking=false;
  audio.pause(); audio.src='';
  audio.onended=null;
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  // 清除所有釋義顯示計時器
  Object.values(lMeaningTimers).forEach(t=>clearTimeout(t));
  lMeaningTimers={};
  const btn=document.getElementById('l-playBtn');
  if(btn) btn.textContent='播放';
  document.getElementById('l-barFill').style.width='0%';
}

// 播放流程：序列號 → 靜音 → 詞彙×3遍 → 下一個詞
function lPlayCurrentStep() {
  if(!lIsPlaying) return;
  if(lWordIdx>=lWords.length) {
    // 這組播完，自動切下一組
    lAutoNextGroup(); return;
  }

  const w=lWords[lWordIdx];
  // 更新進度條
  const pct=(lWordIdx/lWords.length)*100;
  document.getElementById('l-barFill').style.width=pct+'%';
  document.getElementById('l-time').textContent=`${lWordIdx+1} / ${lWords.length}`;
  lRenderWordList(lWordIdx);

  if(lRepeat===0) {
    // 先播序列號
    const serialFile=`${SERIAL_PREFIX}${lWordIdx+1}.mp3`;
    audio.src=serialFile;
    audio.onended=()=>{
      if(!lIsPlaying) return;
      setTimeout(()=>{ if(!lIsPlaying) return; lPlayWordAudio(); }, SILENCE_AFTER_SERIAL);
    };
    audio.play().catch(()=>{ setTimeout(()=>lPlayWordAudio(), SILENCE_AFTER_SERIAL); });
  } else {
    lPlayWordAudio();
  }
}

function lPlayWordAudio() {
  if(!lIsPlaying) return;
  const w=lWords[lWordIdx];
  if(!w.audio) { lAdvance(); return; }
  audio.src=`${AUDIO_PREFIX}${w.audio}`;
  audio.onended=()=>{
    if(!lIsPlaying) return;
    lRepeat++;
    if(lRepeat<3) {
      setTimeout(()=>{ if(!lIsPlaying) return; lPlayWordAudio(); }, SILENCE_BETWEEN_REPEAT);
    } else {
      lAdvance();
    }
  };
  audio.play().catch(()=>lAdvance());
}

function lAdvance() {
  if(!lIsPlaying || lIsPaused) return;
  lRepeat=0;
  const w=lWords[lWordIdx];
  const ttsOn = document.getElementById('l-ttsToggle')?.checked;
  const ttsText = ttsOn ? extractFirstMeaning(w.meaning||'') : '';
  const fullMeaning = w.meaning||'';
  const meaningIdx = lWordIdx;

  // 顯示完整釋義（不論是否開TTS）
  if(fullMeaning) {
    const mEl = document.getElementById(`lwm-${meaningIdx}`);
    if(mEl){ mEl.textContent = fullMeaning; mEl.style.display='block'; mEl.style.marginTop='4px'; }
    // 60秒後消失
    if(lMeaningTimers[meaningIdx]) clearTimeout(lMeaningTimers[meaningIdx]);
    lMeaningTimers[meaningIdx] = setTimeout(()=>{
      const el = document.getElementById(`lwm-${meaningIdx}`);
      if(el){ el.style.display='none'; el.textContent=''; }
      delete lMeaningTimers[meaningIdx];
    }, MEANING_DISPLAY_MS);
  }

  if(ttsText) {
    setTimeout(()=>{
      if(!lIsPlaying || lIsPaused) return;
      lIsSpeaking=true;
      speakMeaning(ttsText, ()=>{
        lIsSpeaking=false;
        if(!lIsPlaying || lIsPaused) return;
        lWordIdx++;
        setTimeout(()=>{ if(!lIsPlaying || lIsPaused) return; lPlayCurrentStep(); }, SILENCE_BETWEEN_WORD);
      });
    }, 1500);
  } else {
    lWordIdx++;
    setTimeout(()=>{ if(!lIsPlaying || lIsPaused) return; lPlayCurrentStep(); }, SILENCE_BETWEEN_WORD);
  }
}

function extractFirstMeaning(meaning) {
  if(!meaning) return '';
  // 取第一個 " / " 之前的內容
  let first = meaning.split(' / ')[0];
  // 去掉 【...】
  first = first.replace(/【[^】]*】/g, '');
  // 去掉 （...） 詞性
  first = first.replace(/（[^）]*）/g, '');
  // 去掉 HTML標籤
  first = first.replace(/<[^>]*>/g, '');
  // 去掉方括號內容
  first = first.replace(/\[[^\]]*\]/g, '');
  // 只取分號前的第一個釋義
  first = first.split('；')[0].split(';')[0];
  return first.trim();
}

function speakMeaning(text, onEnd) {
  if(!text || !window.speechSynthesis) { if(onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.9;
  utter.onend = ()=>{ if(onEnd) onEnd(); };
  utter.onerror = ()=>{ if(onEnd) onEnd(); };
  window.speechSynthesis.speak(utter);
}

function lAutoNextGroup() {
  const i=lAllGroups.indexOf(lGroup);
  if(i<lAllGroups.length-1) {
    const nextGid=lAllGroups[i+1];
    // 更新UI選中下一組
    const btns=[...document.querySelectorAll('#l-groupRow .group-btn')];
    const nextBtn=btns.find(b=>b.dataset.gid===nextGid);
    if(nextBtn) {
      btns.forEach(b=>b.classList.remove('active'));
      nextBtn.classList.add('active');
    }
    lGroup=nextGid;
    lWords=vocab.words.filter(w=>w.group_id===nextGid);
    lWordIdx=0; lRepeat=0;
    const num=parseInt(nextGid.split('-G')[1]);
    document.getElementById('l-nowPlaying').textContent=`${lLevel} 第 ${num} 組`;
    document.getElementById('l-time').textContent=`共 ${lWords.length} 個詞`;
    lUpdateNavBtns();
    // 清空列表，強制重新渲染
    document.getElementById('l-wordList').innerHTML='';
    lRenderWordList(-1);
    setTimeout(()=>{ if(!lIsPlaying) return; lPlayCurrentStep(); }, 1500);
  } else {
    // 整個level播完
    lIsPlaying=false;
    document.getElementById('l-playBtn').textContent='重新播放';
    document.getElementById('l-barFill').style.width='100%';
    document.getElementById('l-time').textContent=`${lLevel} 全部播完！`;
    lRenderWordList(-1);
  }
}

// ════════════════════════════════════════
// 練習
// ════════════════════════════════════════
let pMode='group', pGroup=null, pWords=[], pIdx=0, pStats={known:0,unknown:0}, pPlaying=false;

function updateUnknownBadge() {
  const c=Object.values(loadRecords()).filter(r=>r.status==='unknown').length;
  document.getElementById('p-unknownBadge').textContent=c;
  if(pMode==='unknown') document.getElementById('p-startBtn').disabled=c===0;
}

function pSetMode(m) {
  pMode=m;
  document.getElementById('p-modeGroup').classList.toggle('active',m==='group');
  document.getElementById('p-modeUnknown').classList.toggle('active',m==='unknown');
  document.getElementById('p-groupSelector').style.display=m==='group'?'':'none';
  document.getElementById('p-startBtn').disabled=m==='unknown'
    ? Object.values(loadRecords()).filter(r=>r.status==='unknown').length===0
    : !pGroup;
}

function pSelectLevel(lv) { pGroup=null; document.getElementById('p-startBtn').disabled=true; buildGroupButtons('p-groupRow',lv,pSelectGroup); }
function pSelectGroup(gid) { pGroup=gid; document.getElementById('p-startBtn').disabled=false; }

function pStartPractice() {
  pWords = pMode==='group'
    ? vocab.words.filter(w=>w.group_id===pGroup)
    : vocab.words.filter(w=>new Set(Object.entries(loadRecords()).filter(([,r])=>r.status==='unknown').map(([k])=>k)).has(w.reading));
  if(!pWords.length) return;
  pIdx=0; pStats={known:0,unknown:0};
  document.getElementById('practiceSelector').style.display='none';
  document.getElementById('flashcardArea').style.display='block';
  document.getElementById('p-groupLabel').textContent=pMode==='group'?pGroup:'不認識的詞';
  pShowCard();
}

function pEnd() { document.getElementById('flashcardArea').style.display='none'; document.getElementById('practiceSelector').style.display='block'; updateUnknownBadge(); }

function pShowCard() {
  if(pIdx>=pWords.length) {
    document.getElementById('p-kanji').textContent='練習完成！';
    document.getElementById('p-reading').classList.add('hidden');
    document.getElementById('p-meaning').classList.add('hidden');
    document.getElementById('p-judgeRow').classList.remove('visible');
    document.getElementById('p-nextBtn').disabled=true; return;
  }
  const w=pWords[pIdx];
  document.getElementById('p-kanji').textContent=w.kanji||w.reading;
  document.getElementById('p-reading').textContent=w.reading; document.getElementById('p-reading').classList.add('hidden');
  document.getElementById('p-meaning').textContent=w.meaning||''; document.getElementById('p-meaning').classList.add('hidden');
  document.getElementById('p-judgeRow').classList.remove('visible');
  document.getElementById('p-progress').textContent=`${pIdx+1} / ${pWords.length}`;
  document.getElementById('p-prevBtn').disabled=pIdx===0;
  document.getElementById('p-nextBtn').disabled=false;
  document.getElementById('p-known').textContent=pStats.known;
  document.getElementById('p-unknown').textContent=pStats.unknown;
}

function pReveal() {
  document.getElementById('p-reading').classList.remove('hidden');
  document.getElementById('p-meaning').classList.remove('hidden');
  document.getElementById('p-judgeRow').classList.add('visible');
}

function pJudge(result) {
  const w=pWords[pIdx]; const records=loadRecords();
  if(!records[w.reading]) records[w.reading]={kanji:w.kanji||w.reading,level:w.level,group_id:w.group_id,review_count:0,last_reviewed:todayStr()};
  const rec=records[w.reading]; rec.last_reviewed=todayStr();
  if(result==='known') { rec.review_count=(rec.review_count||0)+1; rec.next_review=getNextReview(rec.review_count); rec.status=rec.review_count>=5?'mastered':'known'; pStats.known++; }
  else { rec.review_count=0; rec.next_review=getNextReview(0); rec.status='unknown'; pStats.unknown++; }
  saveRecords(records);
  setTimeout(()=>{pIdx++;pShowCard();},400);
}

function pPrev() { if(pIdx>0){pIdx--;pShowCard();} }
function pNext() { if(pIdx<pWords.length){pIdx++;pShowCard();} }

function pPlayWord() {
  if(pPlaying) return;
  const w=pWords[pIdx]; if(!w||!w.audio) return;
  const btn=document.getElementById('p-soundBtn'); btn.classList.add('playing'); pPlaying=true;
  let c=0;
  function once() {
    if(c>=3){btn.classList.remove('playing');pPlaying=false;return;}
    audio.src=`audio/${w.audio}`; audio.play().catch(()=>{});
    c++; audio.onended=()=>{if(c<3)setTimeout(once,1500);else{btn.classList.remove('playing');pPlaying=false;}};
  }
  once();
}

// ════════════════════════════════════════
// 複習
// ════════════════════════════════════════
let rvWords=[], rvIdx=0, rvStats={known:0,unknown:0}, rvPlaying=false;

function rUpdateHome() {
  if(!vocab) return;
  const records=loadRecords(); const today=todayStr(); const total=vocab.words.length;
  let mastered=0,known=0,unknown=0,due=0;
  Object.values(records).forEach(r=>{
    if(r.status==='mastered') mastered++;
    else if(r.status==='known'){known++;if(r.next_review<=today)due++;}
    else if(r.status==='unknown'){unknown++;due++;}
  });
  document.getElementById('r-mastered').textContent=mastered;
  document.getElementById('r-known').textContent=known;
  document.getElementById('r-unknown').textContent=unknown;
  document.getElementById('r-unseen').textContent=Math.max(0,total-mastered-known-unknown);
  document.getElementById('r-todayCount').textContent=due;
  const btn=document.getElementById('r-startBtn');
  btn.disabled=due===0; btn.textContent=due>0?`開始今日複習（${due} 個詞）`:'今日無需複習 ✓';
  const pct=Math.round((mastered+known)/total*100);
  document.getElementById('r-barPct').textContent=pct+'%';
  document.getElementById('r-barMastered').style.width=(mastered/total*100)+'%';
  document.getElementById('r-barKnown').style.width=(known/total*100)+'%';
  document.getElementById('r-barUnknown').style.width=(unknown/total*100)+'%';
  const future={};
  Object.values(records).forEach(r=>{if(r.status==='known'&&r.next_review>today) future[r.next_review]=(future[r.next_review]||0)+1;});
  const dates=Object.keys(future).sort().slice(0,7);
  document.getElementById('r-schedule').innerHTML=dates.length===0
    ?'<div class="status-msg">暫無複習計劃</div>'
    :dates.map(d=>`<div class="schedule-row"><span style="color:#aaa">${d===addDays(1)?'明天':d}</span><span style="color:#4a7fa5;font-weight:500">${future[d]} 個詞</span></div>`).join('');
}

function rStartReview() {
  const records=loadRecords(); const today=todayStr();
  const due=new Set(Object.entries(records).filter(([,r])=>r.status==='unknown'||(r.status==='known'&&r.next_review<=today)).map(([k])=>k));
  rvWords=vocab.words.filter(w=>due.has(w.reading));
  if(!rvWords.length) return;
  rvIdx=0; rvStats={known:0,unknown:0};
  document.getElementById('reviewHome').style.display='none';
  document.getElementById('reviewPracticeArea').style.display='block';
  document.getElementById('rv-done').style.display='none';
  document.getElementById('rv-card').style.display='flex';
  document.getElementById('rv-actions').style.display='block';
  document.getElementById('rv-label').textContent=`共 ${rvWords.length} 個詞`;
  rvShowCard();
}

function rBackHome() {
  document.getElementById('reviewPracticeArea').style.display='none';
  document.getElementById('reviewHome').style.display='block';
  rUpdateHome(); updateUnknownBadge();
}

function rvShowCard() {
  if(rvIdx>=rvWords.length){rvShowDone();return;}
  const w=rvWords[rvIdx]; const rec=loadRecords()[w.reading];
  document.getElementById('rv-kanji').textContent=w.kanji||w.reading;
  document.getElementById('rv-reading').textContent=w.reading; document.getElementById('rv-reading').classList.add('hidden');
  document.getElementById('rv-meaning').textContent=w.meaning||''; document.getElementById('rv-meaning').classList.add('hidden');
  document.getElementById('rv-judgeRow').classList.remove('visible');
  document.getElementById('rv-info').textContent=rec?`第 ${(rec.review_count||0)+1} 次複習`:'初次遇見';
  document.getElementById('rv-progress').textContent=`${rvIdx+1} / ${rvWords.length}`;
  document.getElementById('rv-prevBtn').disabled=rvIdx===0;
  document.getElementById('rv-nextBtn').disabled=rvIdx>=rvWords.length-1;
  document.getElementById('rv-known').textContent=rvStats.known;
  document.getElementById('rv-unknown').textContent=rvStats.unknown;
}

function rvReveal() {
  document.getElementById('rv-reading').classList.remove('hidden');
  document.getElementById('rv-meaning').classList.remove('hidden');
  document.getElementById('rv-judgeRow').classList.add('visible');
}

function rvJudge(result) {
  const w=rvWords[rvIdx]; const records=loadRecords();
  if(!records[w.reading]) records[w.reading]={kanji:w.kanji||w.reading,level:w.level,group_id:w.group_id,review_count:0,last_reviewed:todayStr()};
  const rec=records[w.reading]; rec.last_reviewed=todayStr();
  if(result==='known'){rec.review_count=(rec.review_count||0)+1;rec.next_review=getNextReview(rec.review_count);rec.status=rec.review_count>=5?'mastered':'known';rvStats.known++;}
  else{rec.review_count=0;rec.next_review=getNextReview(0);rec.status='unknown';rvStats.unknown++;}
  saveRecords(records);
  setTimeout(()=>{rvIdx++;rvShowCard();},400);
}

function rvPrev() { if(rvIdx>0){rvIdx--;rvShowCard();} }
function rvNext() { if(rvIdx<rvWords.length){rvIdx++;rvShowCard();} }

function rvShowDone() {
  document.getElementById('rv-card').style.display='none';
  document.getElementById('rv-actions').style.display='none';
  document.getElementById('rv-done').style.display='block';
  document.getElementById('rv-doneSub').textContent=`認識 ${rvStats.known} 個，不認識 ${rvStats.unknown} 個`;
}

function rvPlayWord() {
  if(rvPlaying) return;
  const w=rvWords[rvIdx]; if(!w||!w.audio) return;
  const btn=document.getElementById('rv-soundBtn'); btn.classList.add('playing'); rvPlaying=true;
  let c=0;
  function once(){
    if(c>=3){btn.classList.remove('playing');rvPlaying=false;return;}
    audio.src=`audio/${w.audio}`; audio.play().catch(()=>{});
    c++; audio.onended=()=>{if(c<3)setTimeout(once,1500);else{btn.classList.remove('playing');rvPlaying=false;}};
  }
  once();
}

// ════════════════════════════════════════
// 單詞列表
// ════════════════════════════════════════
let wlPlaying=false, wlLevel=null;

function wlSelectLevel(lv) {
  wlLevel=lv;
  buildGroupButtons('wl-groupRow', lv, wlSelectGroup);
  document.getElementById('wl-list').innerHTML='<div class="status-msg">選擇分組後顯示單詞列表</div>';
}

function wlSelectGroup(gid) {
  const words=vocab.words.filter(w=>w.group_id===gid);
  document.getElementById('wl-list').innerHTML=`<div class="wl-word-list">${
    words.map((w,i)=>`<div class="wl-item" id="wli-${i}">
      <span class="lw-num">${i+1}</span>
      <span class="wl-kanji">${w.kanji||w.reading}</span>
      <span class="wl-reading">${w.reading}</span>
      <span class="wl-meaning">${w.meaning||''}</span>
      <button class="sound-btn" onclick="wlPlay('${w.audio}',this,${i})" style="margin-left:auto">🔊</button>
    </div>`).join('')
  }</div>`;
}

function wlPlay(audioFile, btnEl, idx) {
  if(!audioFile) return;
  if(wlPlaying){ audio.pause(); wlPlaying=false;
    document.querySelectorAll('.wl-item').forEach(el=>el.classList.remove('current'));
    document.querySelectorAll('#wl-list .sound-btn').forEach(b=>b.classList.remove('playing'));
    return;
  }
  wlPlaying=true;
  // 高亮詞條
  document.querySelectorAll('.wl-item').forEach(el=>el.classList.remove('current'));
  const itemEl=document.getElementById(`wli-${idx}`);
  if(itemEl){ itemEl.classList.add('current'); itemEl.scrollIntoView({behavior:'smooth',block:'center'}); }
  if(btnEl) btnEl.classList.add('playing');
  let c=0;
  function once(){
    if(c>=3){
      wlPlaying=false;
      if(btnEl) btnEl.classList.remove('playing');
      if(itemEl) itemEl.classList.remove('current');
      return;
    }
    audio.src=`audio/${audioFile}`; audio.play().catch(()=>{});
    c++;
    audio.onended=()=>{ if(c<3) setTimeout(once,1500); else {
      wlPlaying=false;
      if(btnEl) btnEl.classList.remove('playing');
      if(itemEl) itemEl.classList.remove('current');
    }};
  }
  once();
}

// ════════════════════════════════════════
// 進度統計
// ════════════════════════════════════════
function sUpdateStats() {
  if(!vocab) return;
  const records=loadRecords(); const total=vocab.words.length;
  const levels=['N5','N4','N3','N2','N1'];
  const ls={};
  levels.forEach(lv=>ls[lv]={total:0,mastered:0,known:0,unknown:0});
  vocab.words.forEach(w=>{if(ls[w.level])ls[w.level].total++;});
  Object.entries(records).forEach(([reading,rec])=>{
    const w=vocab.words.find(x=>x.reading===reading);
    if(!w||!ls[w.level]) return;
    if(rec.status==='mastered') ls[w.level].mastered++;
    else if(rec.status==='known') ls[w.level].known++;
    else if(rec.status==='unknown') ls[w.level].unknown++;
  });
  document.getElementById('s-levelStats').innerHTML=levels.map(lv=>{
    const s=ls[lv]; const pct=Math.round((s.mastered+s.known)/s.total*100)||0;
    return `<div class="level-stat-row">
      <span class="level-tag">${lv}</span>
      <div class="level-bar-bg"><div class="level-bar-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:#666;min-width:32px;text-align:right">${pct}%</span>
      <span style="font-size:12px;color:#555;min-width:58px;text-align:right">${s.mastered+s.known}/${s.total}</span>
    </div>`;
  }).join('');
  const allR=Object.values(records);
  const mastered=allR.filter(r=>r.status==='mastered').length;
  const known=allR.filter(r=>r.status==='known').length;
  const unknown=allR.filter(r=>r.status==='unknown').length;
  document.getElementById('s-summary').innerHTML=`
    <div class="level-stat-row"><span style="color:#aaa">總詞彙</span><span style="color:#fff;margin-left:auto">${total} 個</span></div>
    <div class="level-stat-row"><span style="color:#4a9">已掌握</span><span style="color:#4a9;margin-left:auto">${mastered} 個</span></div>
    <div class="level-stat-row"><span style="color:#4a7fa5">複習中</span><span style="color:#4a7fa5;margin-left:auto">${known} 個</span></div>
    <div class="level-stat-row"><span style="color:#e66">不認識</span><span style="color:#e66;margin-left:auto">${unknown} 個</span></div>
    <div class="level-stat-row" style="border:none"><span style="color:#555">未學習</span><span style="color:#555;margin-left:auto">${Math.max(0,total-mastered-known-unknown)} 個</span></div>
  `;
}

// 純聽進度條點擊跳轉
document.getElementById('l-barBg').addEventListener('click', function(e) {
  if(!lWords.length || !lIsPlaying) return;
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetIdx = Math.floor(pct * lWords.length);
  lWordIdx = Math.max(0, Math.min(targetIdx, lWords.length-1));
  lRepeat = 0;
  audio.pause(); audio.src='';
  lPlayCurrentStep();
});

init();
</script>
